name: Check Upstream Updates

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of each month at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_OWNER: tidymodels
  UPSTREAM_REPO: TMwR
  UPSTREAM_BRANCH: main
  TRANSLATION_REPO: tmwr-es

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout translation repo
        uses: actions/checkout@v4

      - name: Fetch upstream file structure
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/git/trees/${UPSTREAM_BRANCH}?recursive=1" \
            --jq '[.tree[] | select(.type == "blob" and (.path | test("\\.(Rmd|qmd|rmd)$"))) | .path] | sort | .[]' \
            > /tmp/upstream_files.txt

          gh api "repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/commits?per_page=20" \
            --jq '[.[] | {sha: .sha[0:7], message: (.commit.message | split("\n")[0]), date: .commit.author.date[0:10]}]' \
            > /tmp/upstream_commits.json

          COMMIT_COUNT=$(jq length /tmp/upstream_commits.json)
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

          STORED=".github/upstream-state.txt"
          if [ -f "$STORED" ] && diff -q /tmp/upstream_files.txt "$STORED" > /dev/null 2>&1; then
            echo "no_structural_change=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_structural_change=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get translation file structure
        if: steps.fetch.outputs.no_structural_change != 'true'
        run: |
          find . -name "*.qmd" -not -path "./.git/*" | sed 's|^\./||' | sort \
            > /tmp/translation_files.txt

      - name: AI structure analysis
        if: steps.fetch.outputs.no_structural_change != 'true'
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM=$(cat /tmp/upstream_files.txt)
          TRANSLATION=$(cat /tmp/translation_files.txt)
          COMMITS=$(jq -r '.[] | "\(.date) [\(.sha)] \(.message)"' /tmp/upstream_commits.json)

          RESPONSE=$(curl -sf https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg u "$UPSTREAM" \
              --arg t "$TRANSLATION" \
              --arg c "$COMMITS" \
              '{
                model: "gpt-4o-mini",
                messages: [{
                  role: "user",
                  content: ("Eres un asistente manteniendo una traducción al español de un libro R.\n\nÚltimos commits upstream:\n" + $c + "\n\nArchivos fuente upstream (.Rmd/.qmd):\n" + $u + "\n\nArchivos de la traducción (.qmd):\n" + $t + "\n\nIdentifica: 1) Nuevos capítulos en upstream no presentes en la traducción, 2) Capítulos renombrados o movidos, 3) Cambios estructurales relevantes. Responde en español de forma concisa y accionable.")
                }],
                max_tokens: 800
              }')") || true

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Análisis de IA no disponible."' 2>/dev/null \
            || echo "Análisis de IA no disponible.")

          {
            echo 'summary<<AIEOF'
            echo "$SUMMARY"
            echo 'AIEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create report and open PR
        if: steps.fetch.outputs.no_structural_change != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_SUMMARY: ${{ steps.ai.outputs.summary }}
          COMMIT_COUNT: ${{ steps.fetch.outputs.commit_count }}
        run: |
          BRANCH="upstream-check-$(date +%Y-%m)"
          MONTH_YEAR=$(date +'%B %Y')
          REPORT=".github/upstream-checks/$(date +%Y-%m).md"

          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            echo "Branch ${BRANCH} already exists — skipping."
            exit 0
          fi

          mkdir -p .github/upstream-checks

          {
            echo "# Revisión upstream — ${MONTH_YEAR}"
            echo ""
            echo "**Upstream:** [${UPSTREAM_OWNER}/${UPSTREAM_REPO}](https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}) \`${UPSTREAM_BRANCH}\`"
            echo "**Traducción:** [davidrsch/${TRANSLATION_REPO}](https://github.com/davidrsch/${TRANSLATION_REPO})"
            echo "**Generado:** $(date +%Y-%m-%d)"
            echo ""
            echo "## Commits recientes en upstream (${COMMIT_COUNT})"
            echo ""
            jq -r '.[] | "- \(.date) `\(.sha)` \(.message)"' /tmp/upstream_commits.json
            echo ""
            echo "## Comparación de estructura"
            echo ""
            echo "### Archivos fuente en upstream"
            echo '```'
            cat /tmp/upstream_files.txt
            echo '```'
            echo ""
            echo "### Archivos en la traducción"
            echo '```'
            cat /tmp/translation_files.txt
            echo '```'
            echo ""
            echo "## Análisis del agente IA"
            echo ""
            echo "${AI_SUMMARY}"
          } > "${REPORT}"

          cp /tmp/upstream_files.txt .github/upstream-state.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${REPORT}" .github/upstream-state.txt
          git commit -m "chore: revisión upstream $(date +%Y-%m)"
          git push origin "${BRANCH}"

          gh pr create \
            --title "🔄 Revisión mensual upstream: ${MONTH_YEAR}" \
            --body-file "${REPORT}" \
            --base main \
            --head "${BRANCH}"
